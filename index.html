<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXANI-II · Probabilidad y Estadística (Simulador oficial)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #e8f0f5;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        .simulador {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 50px rgba(0, 40, 60, 0.3);
            overflow: hidden;
        }
        .cabecera {
            background: #1e4a5e;
            color: white;
            padding: 28px 30px;
            text-align: center;
            border-bottom: 5px solid #ff9933;
        }
        .cabecera h1 {
            font-size: 2.3rem;
            font-weight: 700;
        }
        .cabecera p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 8px;
        }
        .contenido {
            padding: 30px 35px;
        }
        .progreso {
            background: #dae0ec;
            height: 16px;
            border-radius: 50px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .barra-progreso {
            background: #ff9933;
            height: 100%;
            width: 0%;
            transition: width 0.2s;
        }
        .nav-pregunta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .badge-pregunta {
            background: #1e4a5e;
            color: white;
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            border: 1px solid #ff9933;
        }
        .badge-tipo {
            background: #ff9933;
            color: #1e4a5e;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: 10px;
        }
        .nav-botones {
            display: flex;
            gap: 15px;
        }
        .btn-nav {
            background: white;
            border: 2px solid #1e4a5e;
            color: #1e4a5e;
            font-weight: 600;
            padding: 8px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-nav:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .btn-nav:hover:not(:disabled) {
            background: #1e4a5e;
            color: white;
        }
        .tarjeta-pregunta {
            background: #f6faff;
            border-radius: 30px;
            padding: 20px 25px;
            border: 1px solid #c7d3e8;
            margin-bottom: 25px;
        }
        .pregunta-item {
            background: white;
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 20px;
            border: 1px solid #b0c0db;
        }
        .num-pregunta {
            background: #ff9933;
            color: #1e4a5e;
            font-weight: 700;
            display: inline-block;
            padding: 6px 22px;
            border-radius: 50px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        .tipo-pregunta {
            display: inline-block;
            background: #1e4a5e;
            color: white;
            padding: 4px 15px;
            border-radius: 30px;
            font-size: 0.85rem;
            margin-left: 15px;
        }
        .texto-pregunta {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #102331;
            line-height: 1.5;
        }
        .opciones {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .opcion {
            display: flex;
            align-items: center;
            gap: 18px;
            background: #f0f5ff;
            padding: 14px 24px;
            border-radius: 40px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.1s;
            font-size: 1.05rem;
        }
        .opcion:hover {
            background: #e2ecfe;
            border-color: #1e4a5e;
        }
        input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #ff9933;
        }
        .acciones {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0 10px;
        }
        .btn-primario, .btn-secundario {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 220px;
        }
        .btn-primario {
            background: #1e4a5e;
            color: white;
            box-shadow: 0 8px 15px rgba(30,74,94,0.3);
        }
        .btn-secundario {
            background: white;
            color: #1e4a5e;
            border: 2px solid #1e4a5e;
        }
        .btn-primario:hover { background: #236b84; transform: scale(1.02); }
        .btn-secundario:hover { background: #e9f0fa; }
        .panel-registro {
            background: #f3f9ff;
            border-radius: 40px;
            padding: 30px;
            border: 3px solid #1e4a5e;
            margin-bottom: 20px;
            text-align: center;
        }
        .panel-registro h2 {
            color: #1e4a5e;
            margin-bottom: 20px;
        }
        .campo {
            margin-bottom: 20px;
            text-align: left;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .campo label {
            display: block;
            font-weight: 600;
            color: #1e4a5e;
            margin-bottom: 5px;
        }
        .campo input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #b0c0db;
            font-size: 1rem;
        }
        .campo input:focus {
            outline: none;
            border-color: #ff9933;
        }
        .btn-registro {
            background: #1e4a5e;
            color: white;
            padding: 15px 50px;
            font-size: 1.3rem;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 10px;
        }
        .panel-resultados {
            background: #f3f9ff;
            border-radius: 40px;
            padding: 30px;
            border: 3px solid #1e4a5e;
            margin-top: 20px;
        }
        .panel-resultados h2 {
            color: #1e4a5e;
            font-size: 2rem;
            border-bottom: 4px solid #ff9933;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
        .tabla-resultados {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .tabla-resultados th {
            background: #1e4a5e;
            color: white;
            padding: 12px 5px;
            font-size: 1rem;
        }
        .tabla-resultados td {
            padding: 10px 5px;
            text-align: center;
            border-bottom: 1px solid #cfdaea;
        }
        .acierto {
            background-color: #d8f0d8;
            font-weight: 600;
        }
        .error {
            background-color: #ffe0e0;
        }
        .puntaje-final {
            font-size: 2.3rem;
            font-weight: 800;
            color: #1e4a5e;
            background: #ff9933;
            display: inline-block;
            padding: 12px 55px;
            border-radius: 60px;
            margin: 10px 0 20px;
        }
        .mensaje-exito {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 50px;
            margin: 15px 0;
            font-weight: 600;
        }
        .mensaje-error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 50px;
            margin: 15px 0;
            font-weight: 600;
        }
        .oculto {
            display: none !important;
        }
        .centrado {
            text-align: center;
        }
        .separador {
            margin: 20px 0;
            text-align: center;
            font-weight: 600;
            color: #1e4a5e;
            background: #ff9933;
            padding: 10px;
            border-radius: 50px;
        }
    </style>
</head>
<body>
<div class="simulador" id="app">
    <div class="cabecera">
        <h1>📊 EXANI-II · Probabilidad y Estadística</h1>
        <p>60 preguntas (30 Estadística + 30 Probabilidad) · Resultados en Google Sheets</p>
    </div>
    <div class="contenido">

        <!-- Panel de registro inicial -->
        <div id="panelRegistro" class="panel-registro">
            <h2>📋 Registro para guardar resultados</h2>
            <div class="campo">
                <label>Nombre completo:</label>
                <input type="text" id="inputNombre" placeholder="Ej. Ana García López">
            </div>
            <div class="campo">
                <label>Correo electrónico:</label>
                <input type="email" id="inputEmail" placeholder="ana@ejemplo.com">
            </div>
            <div id="mensajeRegistro"></div>
            <button class="btn-registro" id="btnComenzar">Comenzar examen</button>
        </div>

        <!-- Barra de progreso -->
        <div class="progreso oculto" id="progresoContainer">
            <div class="barra-progreso" id="barraProgreso"></div>
        </div>

        <!-- MODO EXAMEN -->
        <div id="modoExamen" class="oculto">
            <div class="nav-pregunta">
                <span class="badge-pregunta" id="preguntaIndicador">Pregunta 1/60</span>
                <div class="nav-botones">
                    <button class="btn-nav" id="btnAnterior" disabled>← Anterior</button>
                    <button class="btn-nav" id="btnSiguiente">Siguiente →</button>
                </div>
            </div>

            <div class="tarjeta-pregunta" id="tarjetaPreguntas">
                <div id="contenedorPregunta"></div>
            </div>

            <div class="acciones">
                <button class="btn-primario" id="btnFinalizar">📊 Finalizar y enviar resultados</button>
                <button class="btn-secundario" id="btnReiniciarExamen">⟲ Nuevo intento</button>
            </div>
        </div>

        <!-- PANEL DE RESULTADOS -->
        <div id="panelResultados" class="panel-resultados oculto">
            <h2>📈 Resultados del examen</h2>
            <div class="separador">Estadística: <span id="aciertosEstadistica">0</span>/30 | Probabilidad: <span id="aciertosProbabilidad">0</span>/30</div>
            <div id="mensajeEnvio"></div>
            <table class="tabla-resultados" id="tablaDetalle">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Tipo</th>
                        <th>Tu respuesta</th>
                        <th>Correcta</th>
                        <th>Evaluación</th>
                    </tr>
                </thead>
                <tbody id="tablaDetalleBody"></tbody>
            </table>
            <div class="centrado">
                <span class="puntaje-final" id="puntajeTotal">0/60</span>
            </div>
            <div class="acciones">
                <button class="btn-primario" id="btnNuevoIntento">⟲ Nuevo intento</button>
                <button class="btn-secundario" id="btnFinalizarApp">✔ Finalizar</button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    // ==============================================================
    // 60 PREGUNTAS DE PROBABILIDAD Y ESTADÍSTICA
    // Primeras 30: Estadística (índices 0-29)
    // Últimas 30: Probabilidad (índices 30-59)
    // ==============================================================
    const preguntas = [
        // ===== ESTADÍSTICA (30 preguntas) =====
        { // 1
            texto: "Completa el siguiente enunciado. Una ________ es un ejemplo de población, mientras que una ________ es ejemplo de ________.",
            opciones: [
                "A) ciudad, colonia, muestra",
                "B) entidad, nación, muestra",
                "C) familia, hija, variable",
                "D) nación, entidad, estadística"
            ],
            correcta: 0, // A
            tipo: 'Estadística'
        },
        { // 2
            texto: "¿Cuál de las siguientes opciones se puede considerar como una muestra del conjunto de los números naturales?",
            opciones: ["A) Primos", "B) Fracciones", "C) Reales", "D) Irracionales"],
            correcta: 0, // A
            tipo: 'Estadística'
        },
        { // 3
            texto: "De la siguiente lista, selecciona las variables que se puedan considerar discretas. 1. Longitud de carreteras 2. Cantidad de tornillos en un paquete 3. Número de asientos de un teatro 4. La masa de los perros criollos 5. Talla de pantalones de mujer 6. Estatura de los estudiantes de preescolar",
            opciones: ["A) 1, 3 y 5", "B) 2, 4 y 6", "C) 2, 3 y 5", "D) 3, 4 y 5"],
            correcta: 2, // C
            tipo: 'Estadística'
        },
        { // 4
            texto: "¿En cuál de las siguientes opciones se menciona una variable continua?",
            opciones: [
                "A) El número de huevos que se pueden acomodar en un paquete",
                "B) La cantidad de granos de arena contenidos en vaso de vidrio",
                "C) La temperatura que se mide con un termómetro digital en un reactor químico",
                "D) La talla del calzado de los estudiantes de una primaria"
            ],
            correcta: 2, // C
            tipo: 'Estadística'
        },
        { // 5
            texto: "Relaciona los tipos de variables con los ejemplos correspondientes. 1. Intervalar 2. Nominal 3. Ordinal 4. Proporcional. Ejemplos: A. Casado o Soltero B. Nivel de estudios C. Estatura de niños de preescolar D. Cuenta bancaria",
            opciones: ["A) A2, B3, C4, D1", "B) A2, B1, C4, D3", "C) A2, B3, C1, D4", "D) A2, B1, C3, D4"],
            correcta: 0, // A
            tipo: 'Estadística'
        },
        { // 6
            texto: "De la siguiente lista, selecciona las variables cualitativas. 1. Sabor de las pizzas 2. Masa corporal 3. Color de los caballos 4. Clima de Cuernavaca 5. Capacidad de envases de refresco 6. Contenido de fracturas en un paquete",
            opciones: ["A) 1, 4 y 5", "B) Sólo 1 y 3", "C) 2, 5 y 6", "D) 1, 3 y 4"],
            correcta: 3, // D
            tipo: 'Estadística'
        },
        { // 7
            texto: "Considera la siguiente tabla de frecuencias: Clase 1 [2.8-3.8) f=5, Clase 2 [3.8-4.8) f=12, Clase 3 [4.8-5.8) f=9, Clase 4 [5.8-6.8) f=6. ¿A qué clases pertenecen respectivamente los datos 3.8 y 5.8?",
            opciones: ["A) 1 y 3", "B) 2 y 3", "C) 2 y 4", "D) 1 y 4"],
            correcta: 1, // B
            tipo: 'Estadística'
        },
        { // 8
            texto: "Con base en la tabla anterior (clases [2.8-3.8), [3.8-4.8), [4.8-5.8), [5.8-6.8)), ¿cuál es el rango de los datos?",
            opciones: ["A) 4", "B) 1", "C) 12", "D) 19"],
            correcta: 0, // A (6.8-2.8=4)
            tipo: 'Estadística'
        },
        { // 9
            texto: "¿De cuántos datos consta la muestra que se estudia en la tabla anterior? (frecuencias: 5,12,9,6)",
            opciones: ["A) 19", "B) 4", "C) 32", "D) 153"],
            correcta: 2, // C (5+12+9+6=32)
            tipo: 'Estadística'
        },
        { // 10
            texto: "Con base en la tabla de frecuencias: Clase 1 [2-6) f=5, Clase 2 [7-11) f=7, Clase 3 [12-16) f=9, Clase 4 [17-21) f=6. ¿Cuáles son los límites reales de la clase 2?",
            opciones: ["A) 6 y 10", "B) 7.5 y 11.5", "C) 6.5 y 11.5", "D) 6.2 y 7.2"],
            correcta: 2, // C
            tipo: 'Estadística'
        },
        { // 11
            texto: "En la tabla anterior, ¿cuál es el valor de la marca de clase número 3? (Clase 3 [12-16))",
            opciones: ["A) 14", "B) 9", "C) 12", "D) 2"],
            correcta: 0, // A ((12+16)/2=14)
            tipo: 'Estadística'
        },
        { // 12
            texto: "¿Cuál es la frecuencia acumulada de la clase número 2 en la tabla anterior? (f1=5, f2=7)",
            opciones: ["A) 12", "B) 17", "C) 7", "D) 14"],
            correcta: 0, // A (5+7=12)
            tipo: 'Estadística'
        },
        { // 13
            texto: "Considera la tabla: Clase 1 [11-17] f=4, Clase 2 [18-24] f=9, Clase 3 [25-31] f=11, Clase 4 [32-38] f=7, Clase 5 [39-45] f=2. ¿Cuál es el intervalo de clase?",
            opciones: ["A) 6", "B) 34", "C) 29", "D) 5"],
            correcta: 0, // A (17-11=6)
            tipo: 'Estadística'
        },
        { // 14
            texto: "Para la tabla anterior, relaciona: 1. Rango, 2. Marca de clase 4, 3. Frecuencia absoluta 5, 4. Frecuencia acumulada 3. Opciones: A)15, B)24, C)35, D)34",
            opciones: ["A) 1D,2C,3B,4A", "B) 1B,2C,3A,4D", "C) 1D,2A,3C,4B", "D) 1D,2C,3A,4B"],
            correcta: 3, // D
            tipo: 'Estadística'
        },
        { // 15
            texto: "¿En cuál de las siguientes opciones se muestra una medida de tendencia central?",
            opciones: ["A) Rango", "B) Mediana", "C) Cuartil", "D) Varianza"],
            correcta: 1, // B
            tipo: 'Estadística'
        },
        { // 16
            texto: "En las siguientes opciones se muestran medidas de dispersión EXCEPTO en:",
            opciones: ["A) Varianza", "B) Desviación estándar", "C) Decil", "D) Rango"],
            correcta: 2, // C (decil es medida de posición)
            tipo: 'Estadística'
        },
        { // 17
            texto: "Relaciona las siguientes columnas: 1. Moda, 2. Mediana, 3. Decil, 4. Cuartil, 5. Percentil, 6. Varianza. Características: A. Divide en 4 partes iguales, B. Divide en 10 partes iguales, C. Mide la dispersión, D. Mayor frecuencia, E. Coincide con Q2, F. Divide en 100 partes iguales.",
            opciones: ["A) 1D,2E,3B,4A,5F,6C", "B) 1E,2D,3B,4A,5F,6C", "C) 1C,2E,3B,4A,5F,6D", "D) 1D,2E,3A,4B,5F,6C"],
            correcta: 0, // A
            tipo: 'Estadística'
        },
        { // 18
            texto: "Se preguntó la talla de pantalón a 7 amigas: 34, 36, 34, 38, 40, 34, 32. ¿Cuál es el promedio?",
            opciones: ["A) 35.4", "B) 35.1", "C) 36.2", "D) 38.1"],
            correcta: 0, // A (248/7=35.428)
            tipo: 'Estadística'
        },
        { // 19
            texto: "Para los datos anteriores (34,36,34,38,40,34,32), ¿cuál es la mediana?",
            opciones: ["A) 34", "B) 36", "C) 35", "D) 34.5"],
            correcta: 0, // A (ordenando: 32,34,34,34,36,38,40 → mediana 34)
            tipo: 'Estadística'
        },
        { // 20
            texto: "Para los mismos datos, ¿cuál es la moda?",
            opciones: ["A) 32", "B) 36", "C) 34", "D) 38"],
            correcta: 2, // C
            tipo: 'Estadística'
        },
        { // 21
            texto: "Para los datos 34,36,34,38,40,34,32, ¿cuál es el rango?",
            opciones: ["A) 2", "B) 8", "C) 4", "D) 9"],
            correcta: 1, // B (40-32=8)
            tipo: 'Estadística'
        },
        { // 22
            texto: "Para los datos 4,2,3,8,12,10,1,14,3,3,2,4,15,2,21,6, ¿cuál es la moda?",
            opciones: ["A) 4", "B) 3", "C) 1", "D) 2"],
            correcta: 3, // D (el 2 aparece 3 veces)
            tipo: 'Estadística'
        },
        { // 23
            texto: "Para las densidades: 948, 940, 952, 965, 940, 968 kg/m³, ¿cuál es la media aritmética?",
            opciones: ["A) 962.4", "B) 795.5", "C) 954.6", "D) 952.2"],
            correcta: 3, // D (5713/6=952.166)
            tipo: 'Estadística'
        },
        { // 24
            texto: "Para los mismos datos, ¿cuál es el valor de la mediana?",
            opciones: ["A) 965", "B) 952", "C) 948", "D) 950"],
            correcta: 1, // B (orden: 940,940,948,952,965,968 → mediana (948+952)/2=950)
            tipo: 'Estadística'
        },
        { // 25
            texto: "¿Cuál es la moda de los datos anteriores?",
            opciones: ["A) 968", "B) 950", "C) 952", "D) 940"],
            correcta: 3, // D
            tipo: 'Estadística'
        },
        { // 26
            texto: "Para los mismos datos, ¿cuál es el rango?",
            opciones: ["A) 8", "B) 20", "C) 28", "D) 7.5"],
            correcta: 2, // C (968-940=28)
            tipo: 'Estadística'
        },
        { // 27
            texto: "Si las calificaciones de Eduardo son 8,7,5,6,9, ¿cuál debe ser su sexta calificación para que el promedio sea 7.2?",
            opciones: ["A) 7", "B) 8", "C) 6", "D) 9"],
            correcta: 1, // B (8+7+5+6+9=35, 7.2*6=43.2, 43.2-35=8.2≈8)
            tipo: 'Estadística'
        },
        { // 28
            texto: "Longitudes de varillas: 8.5,8.8,8.3,8.8,8.9,8.6,8.8. ¿Cuál debe ser la octava para que el promedio sea 8.71?",
            opciones: ["A) 8.8", "B) 8.6", "C) 8.5", "D) 9.0"],
            correcta: 0, // A
            tipo: 'Estadística'
        },
        { // 29
            texto: "Eduardo olvidó su quinto examen. Sus calificaciones: 8,7,9,9. Si su promedio fue 8, ¿cuál fue su quinto parcial?",
            opciones: ["A) 7", "B) 7", "C) 8", "D) 9"],
            correcta: 0, // A (8+7+9+9=33, 8*5=40, 40-33=7)
            tipo: 'Estadística'

            texto: "Máquina produce 2850 latas/día. Se descompuso en el percentil 80. ¿Cuántas latas fabricó?",

            correcta: 1, // B (2850*0.8 = 2280)
            tipo: 'Probabilidad'

    ];

    // ==============================================================
    // CONFIGURACIÓN GOOGLE SHEETS
    // ==============================================================
    // IMPORTANTE: Reemplaza con tu URL de Apps Script
    const URL_GOOGLE_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbyl0ukJfQhif1YJu-VffYKkTNOoiILbR7z5WZU2tCkd3N-aE8DZabXvdgkUBSGW5cXk/exec';

    // Estado
    let preguntaActual = 0;
    let respuestas = Array(60).fill(null);
    let datosUsuario = { nombre: '', email: '' };

    // Elementos DOM
    const panelRegistro = document.getElementById('panelRegistro');
    const progresoContainer = document.getElementById('progresoContainer');
    const modoExamen = document.getElementById('modoExamen');
    const panelResultados = document.getElementById('panelResultados');
    const inputNombre = document.getElementById('inputNombre');
    const inputEmail = document.getElementById('inputEmail');
    const btnComenzar = document.getElementById('btnComenzar');
    const mensajeRegistro = document.getElementById('mensajeRegistro');
    const mensajeEnvio = document.getElementById('mensajeEnvio');
    const btnAnterior = document.getElementById('btnAnterior');
    const btnSiguiente = document.getElementById('btnSiguiente');
    const btnFinalizar = document.getElementById('btnFinalizar');
    const btnReiniciarExamen = document.getElementById('btnReiniciarExamen');
    const btnNuevoIntento = document.getElementById('btnNuevoIntento');
    const btnFinalizarApp = document.getElementById('btnFinalizarApp');
    const preguntaIndicador = document.getElementById('preguntaIndicador');
    const contenedorPregunta = document.getElementById('contenedorPregunta');
    const barraProgreso = document.getElementById('barraProgreso');
    const tablaDetalleBody = document.getElementById('tablaDetalleBody');
    const puntajeTotal = document.getElementById('puntajeTotal');
    const aciertosEstadistica = document.getElementById('aciertosEstadistica');
    const aciertosProbabilidad = document.getElementById('aciertosProbabilidad');

    // Funciones
    function guardarRespuestaActual() {
        const radios = contenedorPregunta.querySelectorAll('input[type="radio"]:checked');
        if (radios.length > 0) {
            respuestas[preguntaActual] = parseInt(radios[0].value);
        }
    }

    function actualizarBarra() {
        const respondidas = respuestas.filter(r => r !== null).length;
        barraProgreso.style.width = (respondidas / 60 * 100) + '%';
    }

    function renderizarPregunta() {
        const p = preguntas[preguntaActual];
        const seleccionada = respuestas[preguntaActual];
        
        let html = `<div class="pregunta-item">`;
        html += `<div class="num-pregunta">Pregunta ${preguntaActual+1} de 60 <span class="tipo-pregunta">${p.tipo}</span></div>`;
        html += `<div class="texto-pregunta">${p.texto}</div>`;
        html += `<div class="opciones">`;
        
        p.opciones.forEach((opcion, idx) => {
            html += `<label class="opcion">`;
            html += `<input type="radio" name="respuesta" value="${idx}" data-pregunta="${preguntaActual}" ${seleccionada === idx ? 'checked' : ''}>`;
            html += opcion;
            html += `</label>`;
        });
        
        html += `</div></div>`;
        contenedorPregunta.innerHTML = html;

        preguntaIndicador.textContent = `Pregunta ${preguntaActual+1}/60`;
        btnAnterior.disabled = (preguntaActual === 0);
        btnSiguiente.disabled = (preguntaActual === 59);
        actualizarBarra();
    }

    function calcularResultados() {
        let aciertosEst = 0;
        let aciertosProb = 0;
        for (let i = 0; i < 60; i++) {
            if (respuestas[i] === preguntas[i].correcta) {
                if (i < 30) aciertosEst++;
                else aciertosProb++;
            }
        }
        return { aciertosEst, aciertosProb, total: aciertosEst + aciertosProb };
    }

    async function enviarResultados() {
        const { aciertosEst, aciertosProb, total } = calcularResultados();
        const porcentaje = ((total / 60) * 100).toFixed(1);
        
        const datos = {
            nombre: datosUsuario.nombre,
            email: datosUsuario.email,
            aciertos: total,
            aciertosEst: aciertosEst,
            aciertosProb: aciertosProb,
            total: 60,
            porcentaje: porcentaje,
            respuestas: respuestas.map(r => r !== null ? r : -1)
        };

        try {
            await fetch(URL_GOOGLE_APPS_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datos)
            });
            mensajeEnvio.innerHTML = '<div class="mensaje-exito">✅ Resultados enviados correctamente</div>';
        } catch (error) {
            mensajeEnvio.innerHTML = '<div class="mensaje-error">❌ Error al enviar. Los resultados se muestran a continuación.</div>';
        }
    }

    function mostrarResultados() {
        guardarRespuestaActual();
        modoExamen.classList.add('oculto');
        panelResultados.classList.remove('oculto');

        const { aciertosEst, aciertosProb, total } = calcularResultados();
        
        let filas = '';
        for (let i = 0; i < 60; i++) {
            const user = respuestas[i];
            const correcta = preguntas[i].correcta;
            const letraUser = user !== null ? String.fromCharCode(65 + user) : '—';
            const letraCorrecta = String.fromCharCode(65 + correcta);
            const clase = (user === correcta) ? 'acierto' : 'error';
            
            filas += `<tr>`;
            filas += `<td>${i+1}</td>`;
            filas += `<td>${preguntas[i].tipo}</td>`;
            filas += `<td>${letraUser}</td>`;
            filas += `<td>${letraCorrecta}</td>`;
            filas += `<td class="${clase}">${user === correcta ? '✓' : '✗'}</td>`;
            filas += `</tr>`;
        }
        tablaDetalleBody.innerHTML = filas;
        puntajeTotal.textContent = `${total}/60`;
        aciertosEstadistica.textContent = aciertosEst;
        aciertosProbabilidad.textContent = aciertosProb;

        enviarResultados();
    }

    function reiniciarSimulacro() {
        respuestas = Array(60).fill(null);
        preguntaActual = 0;
        panelRegistro.classList.remove('oculto');
        progresoContainer.classList.add('oculto');
        modoExamen.classList.add('oculto');
        panelResultados.classList.add('oculto');
        mensajeRegistro.innerHTML = '';
        mensajeEnvio.innerHTML = '';
    }

    function comenzarExamen() {
        const nombre = inputNombre.value.trim();
        const email = inputEmail.value.trim();
        
        if (!nombre || !email) {
            mensajeRegistro.innerHTML = '<div class="mensaje-error">❌ Completa todos los campos</div>';
            return;
        }
        if (!email.includes('@') || !email.includes('.')) {
            mensajeRegistro.innerHTML = '<div class="mensaje-error">❌ Correo inválido</div>';
            return;
        }
        
        datosUsuario = { nombre, email };
        panelRegistro.classList.add('oculto');
        progresoContainer.classList.remove('oculto');
        modoExamen.classList.remove('oculto');
        renderizarPregunta();
    }

    // Event listeners
    btnComenzar.addEventListener('click', comenzarExamen);

    btnAnterior.addEventListener('click', () => {
        guardarRespuestaActual();
        if (preguntaActual > 0) {
            preguntaActual--;
            renderizarPregunta();
        }
    });

    btnSiguiente.addEventListener('click', () => {
        guardarRespuestaActual();
        if (preguntaActual < 59) {
            preguntaActual++;
            renderizarPregunta();
        }
    });

    btnFinalizar.addEventListener('click', mostrarResultados);
    btnReiniciarExamen.addEventListener('click', reiniciarSimulacro);
    btnNuevoIntento.addEventListener('click', reiniciarSimulacro);
    btnFinalizarApp.addEventListener('click', () => alert('Simulador finalizado. ¡Gracias por practicar!'));

    document.addEventListener('change', (e) => {
        if (e.target.matches('input[type="radio"]')) {
            respuestas[preguntaActual] = parseInt(e.target.value);
            actualizarBarra();
        }
    });

    // Inicializar
    panelRegistro.classList.remove('oculto');
    progresoContainer.classList.add('oculto');
    modoExamen.classList.add('oculto');
    panelResultados.classList.add('oculto');
})();
</script>
